<svg viewBox="0 0 1240 420" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Helvetica, Arial, sans-serif">
  <rect width="1240" height="420" fill="#ffffff"/>
  <text x="60" y="60" font-size="15" letter-spacing="3" fill="#9aa0a6">UNO — COLLECTION STRUCTURE</text>
  <text x="60" y="96" font-size="26" font-weight="700" fill="#1f2937">Two seasons · models × 3 colors · bio-acetate</text>

  <!-- FW22 -->
  <rect x="60" y="140" width="540" height="220" rx="14" fill="#fafbfc" stroke="#e2e5e9" stroke-width="1.5"/>
  <text x="88" y="182" font-size="13" letter-spacing="2" fill="#398690" font-weight="700">FW22</text>
  <text x="88" y="212" font-size="20" font-weight="700" fill="#1f2937">Optical</text>
  <text x="88" y="238" font-size="14" fill="#5f6368">Blue-light / Prescription — 2–3 models, 3 colors each</text>
  <!-- model chips -->
  <rect x="88" y="262" width="150" height="66" rx="10" fill="#ffffff" stroke="#e2e5e9"/>
  <text x="163" y="296" font-size="15" font-weight="600" fill="#1f2937" text-anchor="middle">Palermo</text>
  <text x="163" y="315" font-size="12" fill="#8a9099" text-anchor="middle">rectangular XS</text>
  <rect x="252" y="262" width="150" height="66" rx="10" fill="#ffffff" stroke="#e2e5e9"/>
  <text x="327" y="296" font-size="15" font-weight="600" fill="#1f2937" text-anchor="middle">Chelsea</text>
  <text x="327" y="315" font-size="12" fill="#8a9099" text-anchor="middle">warm tortoise</text>
  <rect x="416" y="262" width="150" height="66" rx="10" fill="#ffffff" stroke="#e2e5e9"/>
  <text x="491" y="296" font-size="15" font-weight="600" fill="#1f2937" text-anchor="middle">Round</text>
  <text x="491" y="315" font-size="12" fill="#8a9099" text-anchor="middle">thin, flowing</text>

  <!-- SS23 -->
  <rect x="640" y="140" width="540" height="220" rx="14" fill="#fafbfc" stroke="#e2e5e9" stroke-width="1.5"/>
  <text x="668" y="182" font-size="13" letter-spacing="2" fill="#398690" font-weight="700">SS23</text>
  <text x="668" y="212" font-size="20" font-weight="700" fill="#1f2937">Sunglasses</text>
  <text x="668" y="238" font-size="14" fill="#5f6368">2–3 models, 3 colors each</text>
  <rect x="668" y="262" width="484" height="66" rx="10" fill="#ffffff" stroke="#e2e5e9"/>
  <text x="910" y="300" font-size="15" fill="#8a9099" text-anchor="middle">Coming soon — same design language, sun lenses</text>

  <!-- footer tag -->
  <rect x="60" y="382" width="220" height="30" rx="15" fill="#f1f3f5"/>
  <text x="170" y="402" font-size="13" fill="#1f2937" text-anchor="middle">Material: sustainable bio-acetate</text>
  <text x="1180" y="402" font-size="13" fill="#8a9099" text-anchor="end">Principle: a frame to match each consumer</text>
