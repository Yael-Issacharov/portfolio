# Builds the site and publishes it to GitHub Pages automatically on every
# push to the "main" branch. You don't run anything by hand — just push.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a deploy manually from the Actions tab

# Permissions the deploy needs (safe defaults).
permissions:
  contents: read
  pages: write
  id-token: write

# If you push twice quickly, let the newer deploy finish (don't cancel a
# publish midway).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3 # installs deps, builds, uploads the site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
