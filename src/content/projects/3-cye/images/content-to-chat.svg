<svg viewBox="0 0 1240 360" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Helvetica, Arial, sans-serif">
  <rect width="1240" height="360" fill="#ffffff"/>
  <text x="60" y="52" font-size="14" letter-spacing="3" fill="#9aa0a6">CYE — CONTENT → CHAT</text>
  <text x="60" y="86" font-size="24" font-weight="700" fill="#1f2937">Static pages become live, contextual responses</text>

  <!-- left: static pages -->
  <g>
    <rect x="80" y="140" width="360" height="180" rx="14" fill="#fafbfc" stroke="#e2e5e9" stroke-width="1.5"/>
    <text x="104" y="176" font-size="13" letter-spacing="2" fill="#8a9099">STATIC PAGES</text>
    <g font-size="15" fill="#1f2937">
      <rect x="104" y="192" width="312" height="30" rx="6" fill="#eef0f2"/><text x="118" y="212">How it works</text>
      <rect x="104" y="230" width="312" height="30" rx="6" fill="#eef0f2"/><text x="118" y="250">Case studies</text>
      <rect x="104" y="268" width="312" height="30" rx="6" fill="#eef0f2"/><text x="118" y="288">About / Company</text>
    </g>
  </g>

  <!-- arrow -->
  <g>
    <line x1="470" y1="230" x2="740" y2="230" stroke="#c4c9cf" stroke-width="2"/>
    <polygon points="740,222 758,230 740,238" fill="#398690"/>
    <text x="614" y="216" font-size="13" fill="#398690" text-anchor="middle" font-weight="600">asked in context</text>
  </g>

  <!-- right: in-chat response -->
  <g>
    <rect x="790" y="140" width="380" height="180" rx="14" fill="#31494e"/>
    <text x="814" y="176" font-size="13" letter-spacing="2" fill="#9fb4b8">IN-CHAT RESPONSE</text>
    <rect x="814" y="192" width="332" height="30" rx="15" fill="#3f5b61"/><text x="830" y="212" font-size="14" fill="#eaf0f1">"How is Cye different?"</text>
    <text x="814" y="248" font-size="13.5" fill="#dbe4e5">Differentiation, methodology, and proof</text>
    <text x="814" y="268" font-size="13.5" fill="#dbe4e5">points — generated in the conversation,</text>
    <text x="814" y="288" font-size="13.5" fill="#dbe4e5">with a next step toward a demo.</text>
  </g>
</svg>
